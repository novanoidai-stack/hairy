<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecha — Wallpaper</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      cursor: default;
    }

    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      display: grid;
      place-items: center;
    }

    /* ---- Ambient background glow ---- */
    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 50% 55% at 50% 52%, rgba(224,52,14,.05) 0%, transparent 70%);
    }

    /* ---- Embers canvas (lightweight) ---- */
    #embers {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ---- Logo container ---- */
    .mark-wrap {
      position: relative;
      width: 220px; height: 220px;
      z-index: 2;
    }

    /* ---- Pulsing glow behind logo ---- */
    .mark-glow {
      position: absolute;
      inset: -40%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,122,46,.10) 0%, rgba(224,52,14,.04) 40%, transparent 65%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50%      { opacity: .85; transform: scale(1.08); }
    }

    /* ---- The SVG logo ---- */
    .mark-wrap svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px rgba(255,122,46,.35))
             drop-shadow(0 0 40px rgba(224,52,14,.12));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="ambient"></div>
  <canvas id="embers"></canvas>

  <!-- Logo -->
  <div class="mark-wrap">
    <div class="mark-glow"></div>
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mGrad" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0" stop-color="#e0340e" />
          <stop offset=".5" stop-color="#ff7a2e" />
          <stop offset="1" stop-color="#ffcf4a" />
        </linearGradient>
      </defs>
      <path d="M22.5 3.5c-1 5.5 2.5 8 3 12.5.4 3.4-1.8 5.6-4.2 5.6-2 0-3.3-1.4-3.3-3.3 0-1.6 1-2.8 1-4.4-3.2 2-6.5 5.6-6.5 11.2a9.5 9.5 0 0 0 19 .3c0-6.4-4.6-10.4-7-16.2-.6-1.5-1.2-3.4-2-5.7Z" fill="url(#mGrad)" />
      <path d="M21.8 22.5c-.4 2.6-2.6 3.8-2.4 6.2.15 1.9 1.5 3.1 3.1 3.1 1.9 0 3.3-1.4 3.3-3.4 0-2.8-2-4.3-4-5.9Z" fill="#fff" opacity=".92" />
    </svg>
  </div>
</div>

<script>
// ============================================================
//  Ultra-optimized fire-ember system — pre-rendered glow textures
//  No ctx.shadowBlur, no save/restore per particle → max FPS
// ============================================================
const cvs = document.getElementById('embers');
const ctx = cvs.getContext('2d', { alpha: true });
let W, H;

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width  = W * dpr;
  cvs.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---- Pre-render glow textures (one per color) ----
const COLORS = [
  { r:255, g:207, b:74  },
  { r:255, g:152, b:46  },
  { r:255, g:122, b:46  },
  { r:224, g:52,  b:14  },
  { r:255, g:90,  b:30  },
  { r:200, g:40,  b:10  },
];

const GLOW_SIZE = 64; // texture size in px
const glowTextures = COLORS.map(c => {
  const off = document.createElement('canvas');
  off.width = GLOW_SIZE; off.height = GLOW_SIZE;
  const oc = off.getContext('2d');
  const cx = GLOW_SIZE / 2;
  const g = oc.createRadialGradient(cx, cx, 0, cx, cx, cx);
  g.addColorStop(0,   `rgba(${c.r},${c.g},${c.b},1)`);
  g.addColorStop(0.15,`rgba(${c.r},${c.g},${c.b},.7)`);
  g.addColorStop(0.4, `rgba(${c.r},${c.g},${c.b},.2)`);
  g.addColorStop(1,   `rgba(${c.r},${c.g},${c.b},0)`);
  oc.fillStyle = g;
  oc.fillRect(0, 0, GLOW_SIZE, GLOW_SIZE);
  return off;
});

const MAX_PARTICLES = 90;
const particles = new Array(MAX_PARTICLES);

// ---- Flat arrays for particle state (cache-friendly) ----
function createEmber(scatter) {
  const centerBias = Math.random() < 0.4;
  const x = centerBias ? W * 0.3 + Math.random() * W * 0.4 : Math.random() * W;
  const maxLife = 200 + Math.random() * 350;
  return {
    x,
    y: scatter ? Math.random() * H : H + 10 + Math.random() * 40,
    vy: -(0.3 + Math.random() * 1.2),
    vx: (Math.random() - 0.5) * 0.4,
    swayAmp:   0.3 + Math.random() * 1.2,
    swayFreq:  0.008 + Math.random() * 0.015,
    swayPhase: Math.random() * Math.PI * 2,
    baseSize:  1 + Math.random() * 2.5,
    maxLife,
    life: scatter ? Math.random() * maxLife : maxLife,
    flickerSpeed: 0.05 + Math.random() * 0.12,
    flickerPhase: Math.random() * Math.PI * 2,
    colorIdx: Math.floor(Math.random() * COLORS.length),
    glowBase: 6 + Math.random() * 10,
    windDrift: (Math.random() - 0.5) * 0.003,
    t: 0
  };
}

for (let i = 0; i < MAX_PARTICLES; i++) {
  particles[i] = createEmber(true);
}

function resetEmber(p) {
  const centerBias = Math.random() < 0.4;
  p.x = centerBias ? W * 0.3 + Math.random() * W * 0.4 : Math.random() * W;
  p.y = H + 10 + Math.random() * 40;
  p.vy = -(0.3 + Math.random() * 1.2);
  p.vx = (Math.random() - 0.5) * 0.4;
  p.swayAmp = 0.3 + Math.random() * 1.2;
  p.swayFreq = 0.008 + Math.random() * 0.015;
  p.swayPhase = Math.random() * Math.PI * 2;
  p.baseSize = 1 + Math.random() * 2.5;
  p.maxLife = 200 + Math.random() * 350;
  p.life = p.maxLife;
  p.flickerSpeed = 0.05 + Math.random() * 0.12;
  p.flickerPhase = Math.random() * Math.PI * 2;
  p.colorIdx = Math.floor(Math.random() * COLORS.length);
  p.glowBase = 6 + Math.random() * 10;
  p.windDrift = (Math.random() - 0.5) * 0.003;
  p.t = 0;
}

// ---- Animation loop (no save/restore, no shadowBlur) ----
function animate() {
  ctx.clearRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'screen';

  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = particles[i];
    p.t++;
    p.life--;

    // Physics
    p.y += p.vy;
    p.vy -= 0.001;
    p.vx += p.windDrift;
    p.x += p.vx + Math.sin(p.t * p.swayFreq + p.swayPhase) * p.swayAmp;

    // Flicker
    const flicker = Math.sin(p.t * p.flickerSpeed + p.flickerPhase);
    const lifeRatio = p.life / p.maxLife;

    let alpha = lifeRatio < 0.2 ? lifeRatio / 0.2 : lifeRatio > 0.85 ? (1 - lifeRatio) / 0.15 : 1;
    alpha *= (0.7 + 0.3 * (flicker * 0.5 + 0.5));

    const size = p.baseSize * (0.6 + 0.4 * (flicker * 0.5 + 0.5)) * (0.4 + 0.6 * lifeRatio);

    // Reset if dead
    if (p.life <= 0 || p.y < -20 || p.x < -40 || p.x > W + 40) {
      resetEmber(p);
      continue;
    }

    if (alpha < 0.02) continue;

    // Draw using pre-rendered glow texture (FAST — no shadowBlur)
    const drawSize = size * (p.glowBase * 0.5);
    ctx.globalAlpha = Math.min(alpha, 1);
    ctx.drawImage(
      glowTextures[p.colorIdx],
      p.x - drawSize * 0.5,
      p.y - drawSize * 0.5,
      drawSize,
      drawSize
    );
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
