<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecha — Text Wallpaper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      cursor: default;
      font-family: 'Space Grotesk', sans-serif;
    }
    canvas {
      display: block;
      width: 100vw; height: 100vh;
    }
  </style>
</head>
<body>

<canvas id="cvs"></canvas>

<script>
// ============================================================
//  MECHA Text Fire Wallpaper
//  Particles follow the shape of "MECHA" text
// ============================================================
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
let W, H, DPR;

// ---- Resize ----
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width  = W * DPR;
  cvs.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  sampleTextPoints(); // re-sample on resize
}

// ---- Sample text pixel positions ----
let textPoints = [];

function sampleTextPoints() {
  // Offscreen canvas to render text
  const off = document.createElement('canvas');
  const oc  = off.getContext('2d');
  off.width  = W;
  off.height = H;

  // Render "MECHA" centered
  const fontSize = Math.min(W * 0.18, H * 0.35, 260);
  oc.font = `700 ${fontSize}px 'Space Grotesk', sans-serif`;
  oc.textAlign = 'center';
  oc.textBaseline = 'middle';
  oc.fillStyle = '#fff';
  oc.fillText('MECHA', W / 2, H / 2);

  // Read pixels and sample points
  const imageData = oc.getImageData(0, 0, W, H);
  const data = imageData.data;
  textPoints = [];

  // Sample every Nth pixel for performance
  const step = Math.max(3, Math.floor(fontSize / 40));
  for (let y = 0; y < H; y += step) {
    for (let x = 0; x < W; x += step) {
      const idx = (y * W + x) * 4;
      if (data[idx + 3] > 128) { // alpha > 50%
        textPoints.push({ x, y });
      }
    }
  }
}

// ---- Color palette ----
const COLORS = [
  { r:255, g:207, b:74  },
  { r:255, g:152, b:46  },
  { r:255, g:122, b:46  },
  { r:224, g:52,  b:14  },
  { r:255, g:90,  b:30  },
  { r:200, g:40,  b:10  },
  { r:255, g:180, b:60  },
];

// ---- Text-bound fire particle ----
class TextEmber {
  constructor() {
    this.reset();
  }

  reset() {
    if (textPoints.length === 0) return;
    // Pick a random point on the text
    const pt = textPoints[Math.floor(Math.random() * textPoints.length)];
    this.homeX = pt.x;
    this.homeY = pt.y;

    // Start at or near home
    this.x = this.homeX + (Math.random() - 0.5) * 6;
    this.y = this.homeY + (Math.random() - 0.5) * 6;

    // Upward drift (fire rises)
    this.vy = -(0.15 + Math.random() * 0.6);
    this.vx = (Math.random() - 0.5) * 0.3;

    // Life
    this.maxLife = 100 + Math.random() * 200;
    this.life = this.maxLife;

    // Size
    this.baseSize = 1.2 + Math.random() * 2.2;

    // Flicker
    this.flickerSpeed = 0.04 + Math.random() * 0.1;
    this.flickerPhase = Math.random() * Math.PI * 2;

    // Sway
    this.swayAmp  = 0.4 + Math.random() * 1.0;
    this.swayFreq = 0.01 + Math.random() * 0.02;

    // Color
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.r = c.r; this.g = c.g; this.b = c.b;

    // Glow
    this.glowBase = 5 + Math.random() * 8;

    this.t = 0;
  }

  update() {
    this.t++;
    this.life--;

    // Rise
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.t * this.swayFreq) * this.swayAmp * 0.3;

    // Fade
    const ratio = this.life / this.maxLife;

    // Flicker
    const flicker = Math.sin(this.t * this.flickerSpeed + this.flickerPhase);
    this.size = this.baseSize * (0.5 + 0.5 * (flicker * 0.5 + 0.5)) * (0.3 + 0.7 * ratio);

    this.alpha = ratio < 0.15
      ? ratio / 0.15
      : ratio > 0.8
        ? (1 - ratio) / 0.2
        : 1;
    this.alpha *= (0.65 + 0.35 * (flicker * 0.5 + 0.5));

    return this.life > 0;
  }

  draw() {
    if (this.alpha < 0.02) return;
    const a = Math.min(this.alpha, 1);
    const s = Math.max(this.size, 0.2);

    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.shadowBlur = this.glowBase * a;
    ctx.shadowColor = `rgba(${this.r},${this.g},${this.b},${a * 0.5})`;
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a * 0.85})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ---- Free-floating ambient embers (background) ----
class AmbientEmber {
  constructor() {
    this.reset(true);
  }

  reset(initial) {
    this.x = Math.random() * W;
    this.y = initial ? Math.random() * H : H + 10 + Math.random() * 30;
    this.vy = -(0.2 + Math.random() * 0.8);
    this.vx = (Math.random() - 0.5) * 0.3;
    this.swayAmp = 0.3 + Math.random() * 0.8;
    this.swayFreq = 0.006 + Math.random() * 0.012;
    this.baseSize = 0.8 + Math.random() * 1.5;
    this.maxLife = 250 + Math.random() * 300;
    this.life = initial ? Math.random() * this.maxLife : this.maxLife;
    this.flickerSpeed = 0.04 + Math.random() * 0.08;
    this.flickerPhase = Math.random() * Math.PI * 2;
    const c = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.r = c.r; this.g = c.g; this.b = c.b;
    this.glowBase = 4 + Math.random() * 6;
    this.t = 0;
  }

  update() {
    this.t++;
    this.life--;
    this.y += this.vy;
    this.x += this.vx + Math.sin(this.t * this.swayFreq) * this.swayAmp * 0.2;
    const ratio = this.life / this.maxLife;
    const flicker = Math.sin(this.t * this.flickerSpeed + this.flickerPhase);
    this.size = this.baseSize * (0.5 + 0.5 * (flicker * 0.5 + 0.5)) * (0.3 + 0.7 * ratio);
    this.alpha = ratio < 0.15 ? ratio / 0.15 : ratio > 0.85 ? (1 - ratio) / 0.15 : 0.7;
    this.alpha *= (0.6 + 0.4 * (flicker * 0.5 + 0.5));
    return this.life > 0 && this.y > -20;
  }

  draw() {
    if (this.alpha < 0.02) return;
    const a = Math.min(this.alpha, 1);
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.shadowBlur = this.glowBase * a;
    ctx.shadowColor = `rgba(${this.r},${this.g},${this.b},${a * 0.4})`;
    ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${a * 0.7})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, Math.max(this.size, 0.2), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ---- Init ----
const TEXT_COUNT    = 350;  // embers forming "MECHA"
const AMBIENT_COUNT = 50;   // background floating embers

const textEmbers    = [];
const ambientEmbers = [];

window.addEventListener('resize', resize);
resize();

// Wait a tick for font to load then re-sample
setTimeout(() => {
  sampleTextPoints();
  // Init text embers
  for (let i = 0; i < TEXT_COUNT; i++) {
    const e = new TextEmber();
    e.life = Math.random() * e.maxLife; // stagger
    e.y = e.homeY + (e.life / e.maxLife - 1) * 30; // scatter vertically
    textEmbers.push(e);
  }
  // Init ambient
  for (let i = 0; i < AMBIENT_COUNT; i++) {
    ambientEmbers.push(new AmbientEmber());
  }
}, 200);

// ---- Draw loop ----
function animate() {
  ctx.clearRect(0, 0, W, H);

  // Draw subtle ambient glow at center
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.min(W,H) * 0.4);
  g.addColorStop(0, 'rgba(224,52,14,.025)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Text embers
  for (let i = 0; i < textEmbers.length; i++) {
    const e = textEmbers[i];
    if (!e.update()) e.reset();
    e.draw();
  }

  // Ambient embers
  for (let i = 0; i < ambientEmbers.length; i++) {
    const e = ambientEmbers[i];
    if (!e.update()) e.reset(false);
    e.draw();
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
