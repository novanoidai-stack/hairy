<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mecha — Simple</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      cursor: default;
    }

    .scene {
      position: relative;
      width: 100vw; height: 100vh;
      display: grid;
      place-items: center;
    }

    /* ---- Logo container ---- */
    .mark-wrap {
      position: relative;
      width: 220px; height: 220px;
      z-index: 2;
    }

    /* ---- Pulsing glow behind logo ---- */
    .mark-glow {
      position: absolute;
      inset: -40%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,122,46,.10) 0%, rgba(224,52,14,.04) 40%, transparent 65%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: .5; transform: scale(1); }
      50%      { opacity: .85; transform: scale(1.08); }
    }

    /* ---- The SVG logo ---- */
    .mark-wrap svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 20px rgba(255,122,46,.35))
             drop-shadow(0 0 40px rgba(224,52,14,.12));
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-7px); }
    }
  </style>
</head>
<body>

<div class="scene">
  <!-- Logo -->
  <div class="mark-wrap">
    <div class="mark-glow"></div>
    <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="mGrad" x1="0" y1="1" x2="0" y2="0">
          <stop offset="0" stop-color="#e0340e" />
          <stop offset=".5" stop-color="#ff7a2e" />
          <stop offset="1" stop-color="#ffcf4a" />
        </linearGradient>
      </defs>
      <path d="M22.5 3.5c-1 5.5 2.5 8 3 12.5.4 3.4-1.8 5.6-4.2 5.6-2 0-3.3-1.4-3.3-3.3 0-1.6 1-2.8 1-4.4-3.2 2-6.5 5.6-6.5 11.2a9.5 9.5 0 0 0 19 .3c0-6.4-4.6-10.4-7-16.2-.6-1.5-1.2-3.4-2-5.7Z" fill="url(#mGrad)" />
      <path d="M21.8 22.5c-.4 2.6-2.6 3.8-2.4 6.2.15 1.9 1.5 3.1 3.1 3.1 1.9 0 3.3-1.4 3.3-3.4 0-2.8-2-4.3-4-5.9Z" fill="#fff" opacity=".92" />
    </svg>
  </div>
</div>

</body>
</html>
